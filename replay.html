<script>

// 유튜브 공식 Data API v3 사용 - 구글 클라우드에서 발급받은 키로 교체하세요
const YT_API_KEY = 'AIzaSyCipMzgxeA7Ty6AUct6y2UszlwOWHEJqgU';

const YT_CHANNELS = [
  { key:'game',   handle:'@crankplus', channelUrl:'https://www.youtube.com/@crankplus',          listId:'list-game' },
  { key:'cast',   id:'UCS2OAdHoLt-9T6cG9A2H49Q', channelUrl:'https://www.youtube.com/channel/UCS2OAdHoLt-9T6cG9A2H49Q', listId:'list-cast' },
  { key:'replay', handle:'@crankdasibogi', channelUrl:'https://www.youtube.com/@crankdasibogi',       listId:'list-replay' },
];

async function fetchLatestVideos(channel, maxResults){
  const CACHE_KEY = 'yt_cache_schedule_v5_' + channel.key + '_' + maxResults;
  const CACHE_TTL = 10 * 60 * 1000;
  try {
    const cached = JSON.parse(localStorage.getItem(CACHE_KEY));
    if (cached && Date.now() - cached.time < CACHE_TTL) return cached.data;
  } catch(e){}

  let playlistId = '';
  if (channel.key === 'game') playlistId = 'UURWDHteRKunVC1Kt-GVQcGw';
  else if (channel.key === 'cast') playlistId = 'UUS2OAdHoLt-9T6cG9A2H49Q';
  else if (channel.key === 'replay') playlistId = 'UUuub1wmXjxMde_SqZwIgICQ';

  if (!playlistId) return [];

  let items = [];
  let nextPageToken = '';
  let fetchedCount = 0;
  const maxToFetch = maxResults + 10; // little buffer

  while (fetchedCount < maxToFetch) {
    const fetchLimit = Math.min(50, maxToFetch - fetchedCount);
    let url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=${fetchLimit}&key=${YT_API_KEY}`;
    if (nextPageToken) url += `&pageToken=${nextPageToken}`;
    
    try {
      const res = await fetch(url);
      const data = await res.json();
      if (!data.items || data.items.length === 0) break;
      items = items.concat(data.items);
      fetchedCount += data.items.length;
      nextPageToken = data.nextPageToken;
      if (!nextPageToken) break;
    } catch(e) {
      break;
    }
  }

  if(items.length === 0) return [];

  const durationMap = {};
  
  // Fetch durations in batches of 50
  for (let i = 0; i < items.length; i += 50) {
    const batch = items.slice(i, i + 50);
    const videoIds = batch.map(it => it.snippet.resourceId.videoId).join(',');
    const durationUrl = `https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${videoIds}&key=${YT_API_KEY}`;
    try {
      const dRes = await fetch(durationUrl);
      const dData = await dRes.json();
      if (dData.items) {
        dData.items.forEach(v => {
          durationMap[v.id] = v.contentDetails.duration;
        });
      }
    } catch(e) {}
  }

  const result = [];
  for (const it of items) {
    const vid = it.snippet.resourceId.videoId;
    const dur = durationMap[vid] || '';
    const isShort = !dur.includes('H') && (!dur.includes('M') || dur === 'PT1M');
    if (!isShort) {
      let title = it.snippet.title;
      if (channel.key === 'replay') {
        const m = title.match(/^(?:20)?(\d{2})[년\s.\-]+0?(\d{1,2})[월\s.\-]+0?(\d{1,2})[일\s.\-]*[|lI\/]*\s*(.*)/);
        if (m) title = `${m[1]}${m[2].padStart(2,'0')}${m[3].padStart(2,'0')}: ${m[4]}`;
      }
      result.push({
        title: title,
        videoId: vid,
        thumb: (it.snippet.thumbnails && it.snippet.thumbnails.medium) ? it.snippet.thumbnails.medium.url : `https://i.ytimg.com/vi/${vid}/mqdefault.jpg`,
        url: `https://www.youtube.com/watch?v=${vid}`
      });
    }
    if (result.length >= maxResults) break;
  }
  
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ time: Date.now(), data: result }));
  } catch(e){}

  return result;
}

function renderListSync(channel) {
  const list = document.getElementById(channel.listId);
  if(!list) return false;
  
  const CACHE_KEY = 'yt_cache_replay_v4_' + channel.key;
  let cachedData = null;
  try{
    const cached = JSON.parse(localStorage.getItem(CACHE_KEY));
    if (cached && Date.now() - cached.time < 10 * 60 * 1000 && cached.data.length > 0) {
      cachedData = cached.data;
    }
  } catch(e){}

  if(cachedData){
    list.innerHTML = '';
    cachedData.forEach(v=>{
      const a = document.createElement('a');
      a.className = 'video-card';
      a.href = v.url;
      a.target = '_blank'; a.rel = 'noopener';
      a.innerHTML = `<img src="${v.thumb}" alt=""><div class="vc-title">${v.title}</div>`;
      list.appendChild(a);
    });
    return true;
  } else {
    list.innerHTML = '';
    for(let i=0;i<3;i++){
      list.innerHTML += `
      <div class="video-card" style="pointer-events:none; border-color:transparent;">
        <div style="width:100%;aspect-ratio:16/9;background:var(--bg-cell-hover);"></div>
        <div style="padding:10px 12px 12px;">
          <div style="height:12px;background:var(--border-strong);width:80%;border-radius:4px;margin-bottom:6px;"></div>
          <div style="height:12px;background:var(--border-strong);width:50%;border-radius:4px;"></div>
        </div>
      </div>`;
    }
    return false;
  }
}

async function loadList(channel){
  const hasCache = renderListSync(channel);

  try{
    const videos = await fetchLatestVideos(channel, 10);
    if (!hasCache) {
      const list = document.getElementById(channel.listId);
      if(videos.length === 0){
        list.innerHTML = '<div class="empty-section">영상을 불러오지 못했어요</div>';
        return;
      }
      list.innerHTML = '';
      videos.forEach(v=>{
        const a = document.createElement('a');
        a.className = 'video-card';
        a.href = v.url;
        a.target = '_blank'; a.rel = 'noopener';
        a.innerHTML = `<img src="${v.thumb}" alt=""><div class="vc-title">${v.title}</div>`;
        list.appendChild(a);
      });
    }
  }catch(e){
    console.error(e);
  }
}

YT_CHANNELS.forEach(loadList);
const themeToggleBtn = document.getElementById('themeToggleBtn');
if (themeToggleBtn) {
  themeToggleBtn.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '🌙' : '☀️';
  themeToggleBtn.addEventListener('click', () => {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    if (isLight) {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('crank_theme', 'dark');
      themeToggleBtn.textContent = '☀️';
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
      localStorage.setItem('crank_theme', 'light');
      themeToggleBtn.textContent = '🌙';
    }
  });
}
